<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Medidor de Anel</title>

  <!-- IMPORTANTE PARA iPHONE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

  <!-- CALIBRAÇÃO -->
  <div id="calibracao" class="tela ativa">
    <h2>Calibração</h2>
    <p>Coloque uma moeda de 1 real na tela e ajuste o círculo</p>

    <div id="area">
      <div id="circulo"></div>
    </div>

    <button onclick="confirmarCalibracao()">Confirmar</button>
  </div>


  <!-- MEDIÇÃO -->
  <div id="medicao" class="tela">
    <h2>Medir dedo / anel</h2>
    <p>Ajuste o círculo ao tamanho do dedo</p>

    <div id="area">
      <div id="circuloMedicao"></div>
    </div>

    <h3 id="resultado">Aro: --</h3>
  </div>

</div>

<!-- SCRIPT SEM ERRO -->
<script src="./script.js"></script>

</body>
</html>
