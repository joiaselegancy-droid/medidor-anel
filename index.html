<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medidor de Anel - Elegancy Joias</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGO -->
<div class="header">
  <img src="https://images.tcdn.com.br/img/img_prod/746662/1629095744_novo_logo1.jpg" class="logo">
</div>

<!-- =========================
     CALIBRAÇÃO
========================= -->
<div id="calibracao" class="tela">

  <h2>Calibração</h2>

  <p>Use uma moeda de 50 centavos</p>

  <div class="dica">
    ✔ Ajuste o círculo exatamente na borda da moeda<br>
    ❌ Não deixe folga
  </div>

  <div class="container">
    <div class="area">
      <div id="circuloCalibrar" class="circulo"></div>
    </div>

    <input type="range" id="sliderCalibrar" min="60" max="260" value="120">
  </div>

  <button onclick="confirmarCalibracao()">Confirmar</button>
</div>

<!-- =========================
     MEDIÇÃO
========================= -->
<div id="medicao" class="tela" style="display:none;">

  <h2>Descubra seu tamanho</h2>

  <div class="dica">
    ✔ Use a parte INTERNA do anel<br>
    ✔ Ajuste até encaixar perfeitamente
  </div>

  <div class="container">
    <div class="area">
      <div id="circuloMedir" class="circulo"></div>
    </div>

    <input type="range" id="sliderMedir" min="60" max="260" value="120">
  </div>

  <div id="resultado">Aro: --</div>

  <div class="termos">
    <input type="checkbox" id="confirmacao">
    <label>Confirmo que conferi a medida</label>
  </div>

  <button onclick="confirmarMedida()">Confirmar medida</button>
</div>

<!-- =========================
     MODAL
========================= -->
<div id="modal" class="modal">
  <div class="modal-box">

    <h2>🎉 Medida confirmada!</h2>

    <p id="modalAro"></p>

    <div class="cupom-box">
      <span>MEDIDACERTA</span>
      <button id="btnCopiar">Copiar</button>
    </div>

    <a id="btnWhats" target="_blank" class="whats">
      Falar no WhatsApp
    </a>

    <button onclick="fecharModal()">Fechar</button>

  </div>
</div>

<footer>
  Criado por Elegancy Joias
</footer>

<script src="script.js"></script>

</body>
</html>
