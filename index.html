<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Medidor de Anel - Elegancy Joias</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <img src="logo.png" alt="Elegancy Joias" class="logo">
</div>

<!-- CALIBRAÇÃO -->
<div id="calibracao" class="tela ativa">
  <h2>Calibração</h2>

  <p>Use uma moeda de 50 centavos</p>

  <div class="dica">
    ✔ Ajuste o círculo exatamente na borda da moeda<br>
    ❌ Não deixe folga
  </div>

  <div class="container">
    <div class="area">
      <div id="circuloCalibrar" class="circulo"></div>
    </div>

    <input type="range" id="sliderCalibrar" class="slider" min="60" max="260" value="120">
  </div>

  <button onclick="confirmarCalibracao()">Confirmar</button>
</div>

<!-- MEDIÇÃO -->
<div id="medicao" class="tela">
  <h2>Descubra seu tamanho</h2>

  <div class="dica">
    ✔ Encoste o círculo na parte INTERNA do anel<br>
    ✔ Ajuste até encaixar perfeitamente
  </div>

  <div class="container">
    <div class="area">
      <div id="circuloMedir" class="circulo"></div>
    </div>

    <input type="range" id="sliderMedir" class="slider" min="60" max="260" value="120">
  </div>

  <div id="resultado">Aro: --</div>
  <div id="feedback">✔ Encaixe perfeito</div>

  <!-- CHECKBOX -->
  <div class="termos">
    <input type="checkbox" id="confirmacao">
    <label for="confirmacao">
      Declaro que conferi a medida e estou ciente que eventuais trocas de tamanho podem gerar custos de frete.
    </label>
  </div>

  <button onclick="confirmarMedida()">Confirmar medida</button>
</div>

<footer>
  Criado por Elegancy Joias
</footer>

<script src="script.js"></script>

</body>
</html>
