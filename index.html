<!-- TELA DE CALIBRAÇÃO -->
<main id="calibracao" class="tela ativa">
    <div class="content">
        <h2>Calibração</h2>
        <p class="instrucao">Use a largura de um cartão de crédito</p>
        
        <div class="dica">
            <strong>Instruções:</strong><br>
            • Pegue um cartão de crédito<br>
            • Coloque o cartão <strong>na horizontal</strong> sobre a tela<br>
            • Ajuste o círculo até que ele encoste exatamente nas duas bordas laterais do cartão<br>
            • Não deixe folga nem ultrapasse
        </div>

        <div class="medidor-container">
            <div class="area-calibracao">
                <div id="circuloCalibrar" class="circulo"></div>
                <div class="guia-cartao-horizontal"></div>
            </div>
            <input type="range" id="sliderCalibrar" class="slider" min="120" max="300" value="200" step="1">
        </div>

        <button onclick="confirmarCalibracao()" class="btn-primary">Confirmar Calibração</button>
    </div>
</main>
