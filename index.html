<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Medidor de Anel - Elegancy Joias</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7f7;
  text-align: center;
  color: #333;
}

.header {
  padding: 20px;
  background: white;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.header h1 {
  margin: 0;
  color: #1FB5B5;
}

.tela {
  display: none;
  padding: 20px;
}

.ativa {
  display: block;
}

/* CONTAINER CENTRAL */
.container {
  position: relative;
  width: 280px;
  margin: 30px auto;
}

/* ÁREA DO CÍRCULO */
#area {
  width: 280px;
  height: 280px;
  border: 2px dashed #ccc;
  border-radius: 12px;
  position: relative;
  background: white;
}

/* CÍRCULO */
.circulo {
  width: 120px;
  height: 120px;
  border: 3px solid #1FB5B5;
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* SLIDER AGORA FORA DO CENTRO */
#slider {
  position: absolute;
  right: -80px; /* afastado SEM mover o centro */
  top: 50%;
  transform: rotate(270deg) translateY(-50%);
  width: 260px;
}

/* trilho */
#slider::-webkit-slider-runnable-track {
  height: 8px;
  background: #ddd;
  border-radius: 10px;
}

/* bolinha */
#slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 26px;
  height: 26px;
  background: #1FB5B5;
  border-radius: 50%;
  margin-top: -9px;
}

/* botão */
button {
  background: #1FB5B5;
  color: white;
  border: none;
  padding: 14px 24px;
  border-radius: 25px;
  font-size: 16px;
}

#resultado {
  font-size: 24px;
  margin-top: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
  <h1>Elegancy Joias</h1>
</div>

<!-- CALIBRAÇÃO -->
<div id="calibracao" class="tela ativa">
  <h2>Calibração</h2>
  <p>Coloque uma moeda de 50 centavos e ajuste o círculo</p>

  <div class="container">
    <div id="area">
      <div id="circuloCalibrar" class="circulo"></div>
    </div>
    <input type="range" id="slider" min="50" max="300" value="120">
  </div>

  <button onclick="confirmarCalibracao()">Confirmar</button>
</div>

<!-- MEDIÇÃO -->
<div id="medicao" class="tela">
  <h2>Descubra seu tamanho</h2>
  <p>Ajuste o círculo ao tamanho do dedo</p>

  <div class="container">
    <div id="area">
      <div id="circuloMedir" class="circulo"></div>
    </div>
    <input type="range" id="slider" min="50" max="300" value="120">
  </div>

  <div id="resultado">Aro: --</div>
</div>

<script>
let pixelsPorMm = 1;

const sliders = document.querySelectorAll("#slider");

sliders.forEach(slider => {
  slider.addEventListener("input", function () {
    let valor = slider.value;

    if (document.getElementById("calibracao").classList.contains("ativa")) {
      let el = document.getElementById("circuloCalibrar");
      el.style.width = valor + "px";
      el.style.height = valor + "px";
    } else {
      let el = document.getElementById("circuloMedir");
      el.style.width = valor + "px";
      el.style.height = valor + "px";
      calcularResultado(valor);
    }
  });
});

function calcularResultado(px) {
  // converte pixels para milímetros (usando calibração)
  let diametroMm = px / pixelsPorMm;

  // calcula circunferência real do anel
  let circunferencia = diametroMm * Math.PI;

  // converte para aro brasileiro
  let aro = Math.round(circunferencia - 40);

  // limites de segurança
  if (aro < 8) aro = 8;
  if (aro > 30) aro = 30;

  // exibir resultado
  document.getElementById("resultado").innerText = "Aro: " + aro;
}
  
</script>

</body>
</html>
