<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Medidor de Anel - Elegancy Joias</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7f7;
  text-align: center;
  color: #333;
}

.header {
  padding: 20px;
  background: white;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.header h1 {
  margin: 0;
  color: #1FB5B5;
}

.tela { display: none; padding: 20px; }
.ativa { display: block; }

.container {
  position: relative;
  width: 280px;
  margin: 30px auto;
}

#area {
  width: 280px;
  height: 280px;
  border: 2px dashed #ccc;
  border-radius: 12px;
  position: relative;
  background: white;
}

/* CÍRCULO */
.circulo {
  width: 120px;
  height: 120px;
  background: rgba(31, 181, 181, 0.15);
  border: 3px solid #1FB5B5;
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  transition: all 0.15s ease;
}

/* ENCAIXE PERFEITO */
.perfeito {
  border-color: #00c853;
  box-shadow: 0 0 15px #00c853;
  background: rgba(0, 200, 83, 0.15);
}

#slider {
  position: absolute;
  right: -80px;
  top: 50%;
  transform: rotate(270deg) translateY(-50%);
  width: 260px;
}

#slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 26px;
  height: 26px;
  background: #1FB5B5;
  border-radius: 50%;
  margin-top: -9px;
}

button {
  background: #1FB5B5;
  color: white;
  border: none;
  padding: 14px 24px;
  border-radius: 25px;
  font-size: 16px;
  margin-top: 15px;
}

#resultado {
  font-size: 24px;
  margin-top: 20px;
  font-weight: bold;
}

#feedback {
  margin-top: 10px;
  font-weight: bold;
  color: #00c853;
  display: none;
}
</style>
</head>

<body>

<div class="header">
  <h1>Elegancy Joias</h1>
</div>

<!-- CALIBRAÇÃO -->
<div id="calibracao" class="tela ativa">
  <h2>Calibração</h2>
  <p>Use uma moeda de 50 centavos</p>

  <div class="container">
    <div id="area">
      <div id="circuloCalibrar" class="circulo"></div>
    </div>
    <input type="range" id="slider" min="50" max="300" value="120">
  </div>

  <button onclick="confirmarCalibracao()">Confirmar</button>
</div>

<!-- MEDIÇÃO -->
<div id="medicao" class="tela">
  <h2>Descubra seu tamanho</h2>

  <div class="container">
    <div id="area">
      <div id="circuloMedir" class="circulo"></div>
    </div>
    <input type="range" id="slider" min="50" max="300" value="120">
  </div>

  <div id="resultado">Aro: --</div>
  <div id="feedback">✔ Encaixe perfeito</div>

  <button onclick="comprar()">Comprar com esse tamanho</button>
</div>

<script>
let pixelsPorMm = 1;
let ultimoAro = null;

const sliders = document.querySelectorAll("#slider");

sliders.forEach(slider => {
  slider.addEventListener("input", function () {
    let valor = slider.value;

    if (document.getElementById("calibracao").classList.contains("ativa")) {
      let el = document.getElementById("circuloCalibrar");
      el.style.width = valor + "px";
      el.style.height = valor + "px";
    } else {
      let el = document.getElementById("circuloMedir");
      el.style.width = valor + "px";
      el.style.height = valor + "px";
      calcularResultado(valor);
    }
  });
});

function confirmarCalibracao() {
  let px = document.getElementById("circuloCalibrar").offsetWidth;
  pixelsPorMm = px / 23;

  document.getElementById("calibracao").classList.remove("ativa");
  document.getElementById("medicao").classList.add("ativa");
}

function calcularResultado(px) {
  let diametro = px / pixelsPorMm;
  let circ = diametro * Math.PI;
  let aro = Math.round(circ - 40);

  if (aro < 8) aro = 8;
  if (aro > 30) aro = 30;

  document.getElementById("resultado").innerText = "Aro: " + aro;

  let circulo = document.getElementById("circuloMedir");
  let feedback = document.getElementById("feedback");

  // FEEDBACK VISUAL
  if (aro === ultimoAro) {
    circulo.classList.add("perfeito");
    feedback.style.display = "block";

    // vibração leve
    if (navigator.vibrate) {
      navigator.vibrate(10);
    }

  } else {
    circulo.classList.remove("perfeito");
    feedback.style.display = "none";
  }

  ultimoAro = aro;
}

// BOTÃO COMPRAR
function comprar() {
  let texto = document.getElementById("resultado").innerText;
  let aro = texto.replace("Aro: ", "");

  alert("Você escolheu aro " + aro + ". Redirecionar para compra.");

  // aqui depois você pode colocar link real da sua loja
}
</script>

</body>
</html>
