<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medidor Premium - Elegancy</title>

<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>

<body>

<div class="topo">
  <h1>Elegancy Joias</h1>
</div>

<h2>Descubra seu tamanho</h2>
<p class="sub">Ajuste com precisão e compre com segurança</p>

<!-- CALIBRAÇÃO -->
<div id="calibracao" class="tela">

  <p class="dica">Use uma moeda de 50 centavos</p>

  <div class="container">
    <div class="area">
      <div id="circuloCalibrar" class="circulo"></div>
    </div>

    <input type="range" id="sliderCalibrar" class="slider">
  </div>

  <button onclick="confirmarCalibracao()">Confirmar calibração</button>
</div>

<!-- MEDIÇÃO -->
<div id="medicao" class="tela" style="display:none;">

  <p class="dica">
    ✔ Ajuste na parte interna do anel
  </p>

  <div class="container">
    <div class="area">
      <div id="circuloMedir" class="circulo"></div>
    </div>

    <input type="range" id="sliderMedir" class="slider">
  </div>

  <div id="resultado">Aro: --</div>

  <input type="checkbox" id="confirmacao">
  <label>Confirme a medida</label>

  <button onclick="confirmarMedida()">Comprar com meu tamanho</button>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <h2>🎉 Perfeito!</h2>
    <p id="modalAro"></p>
    <p>Use seu tamanho com segurança</p>
    <button onclick="fecharModal()">Continuar</button>
  </div>
</div>

</body>
</html>
