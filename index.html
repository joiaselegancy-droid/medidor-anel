<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medidor de Anel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <img src="https://images.tcdn.com.br/img/img_prod/746662/1629095744_novo_logo1.jpg" class="logo">
</div>

<!-- MEDIÇÃO -->
<div id="medicao" class="tela ativa">

  <h2>Descubra seu tamanho</h2>

  <div class="container">
    <div class="area">
      <div id="circuloMedir" class="circulo"></div>
    </div>

    <input type="range" id="sliderMedir" min="60" max="260" value="120">
  </div>

  <div id="resultado">Aro: --</div>

  <div class="termos">
    <input type="checkbox" id="confirmacao">
    <label>Confirmo que conferi a medida</label>
  </div>

  <button onclick="confirmarMedida()">Confirmar</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">

    <h2>🎉 Pronto!</h2>
    <p id="modalAro"></p>

    <div class="cupom-box">
      <span id="cupom">MEDIDACERTA</span>
      <button id="btnCopiar">Copiar</button>
    </div>

    <a id="btnWhats" target="_blank" class="whats">
      Falar no WhatsApp
    </a>

    <button onclick="fecharModal()">Fechar</button>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
