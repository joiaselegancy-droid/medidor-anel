<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medidor de Anel - Elegancy Joias</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Elegancy Joias</h1>
    </header>

    <!-- TELA DE CALIBRAÇÃO -->
    <div id="calibracao" class="tela ativa">
        <h2>Calibração</h2>
        <p class="instrucao">Posicione o cartão de crédito deitado</p>
        
        <div class="calibracao-area">
            <div class="borda-azul"></div>
            <div id="circuloCalibrar" class="circulo-calibracao"></div>
        </div>

        <div class="controles">
            <button onclick="ajustarCalibracao(-5)">−</button>
            <span id="valorCalibracao">220px</span>
            <button onclick="ajustarCalibracao(5)">+</button>
        </div>

        <button onclick="confirmarCalibracao()" class="btn-confirmar">Bora descobrir o tamanho do aro</button>
    </div>

    <!-- TELA DE MEDIÇÃO -->
    <div id="medicao" class="tela">
        <h2>Descubra seu tamanho</h2>
        <p class="instrucao">Ajuste a bola na parte interna do anel</p>
        
        <div class="medicao-area">
            <div class="borda-azul-medicao"></div>
            <div id="circuloMedir" class="circulo-medicao"></div>
        </div>

        <div class="controles">
            <button onclick="ajustarMedicao(-5)">−</button>
            <span id="valorMedicao">170px</span>
            <button onclick="ajustarMedicao(5)">+</button>
        </div>

        <div class="resultado">
            Aro: <strong id="tamanhoAro">--</strong>
        </div>

        <button onclick="comprar()" class="btn-confirmar">Quero comprar neste tamanho</button>
        <button onclick="voltar()" class="btn-secundario">Refazer calibração</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
