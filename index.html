<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medidor de Anel - Elegancy Joias</title>

<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>

<body>

<div class="header">
  <img src="https://images.tcdn.com.br/img/img_prod/746662/1629095744_novo_logo1.jpg" class="logo">
</div>

<h2>Descubra seu tamanho</h2>

<!-- CALIBRAÇÃO -->
<div id="calibracao">
  <p><b>Passo 1:</b> Use uma moeda de 50 centavos</p>

  <div class="area">
    <div id="circuloCalibrar" class="circulo"></div>
  </div>

  <input type="range" id="sliderCalibrar" min="60" max="260" value="120">

  <button id="btnCalibrar">Confirmar calibração</button>
</div>

<!-- MEDIÇÃO -->
<div id="medicao">
  <p><b>Passo 2:</b> Ajuste no anel</p>

  <div class="area">
    <div id="circuloMedir" class="circulo"></div>
  </div>

  <input type="range" id="sliderMedir" min="60" max="260" value="120">

  <h2 id="resultado">Aro: --</h2>

  <!-- 🔴 BLOCO GARANTIDO -->
  <div class="confirmacao-box">

    <label class="linha">
      <input type="checkbox" id="confirmacao">
      Confirmo que conferi a medida corretamente
    </label>

    <label class="linha termos">
      <input type="checkbox" id="termosTroca">
      Estou ciente de que podem ocorrer variações na medição e que trocas podem gerar custos de envio (ida e volta)
    </label>

  </div>

  <button id="btnConfirmar">Confirmar medida</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <h3 id="modalAro"></h3>
    <p>🎁 Use o cupom:</p>
    <div class="cupom">MEDIDACERTA</div>
    <button id="fecharModal">Fechar</button>
  </div>
</div>

<footer>
  Criado por Elegancy Joias
</footer>

</body>
</html>
