<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medidor Premium - Elegancy Joias</title>

<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>

<body>

<h2>Descubra seu tamanho</h2>

<p class="sub">
Ajuste com precisão e encontre seu aro ideal
</p>

<!-- CALIBRAÇÃO -->
<div id="calibracao">

  <p>Use uma moeda de 50 centavos</p>

  <div class="area">
    <div id="circuloCalibrar" class="circulo"></div>
  </div>

  <input type="range" id="sliderCalibrar" min="60" max="260" value="120">

  <br><br>
  <button onclick="confirmarCalibracao()">Confirmar calibração</button>
</div>

<!-- MEDIÇÃO -->
<div id="medicao" style="display:none;">

  <p class="dica">Ajuste na parte interna do anel</p>

  <div class="area">
    <div id="circuloMedir" class="circulo"></div>
  </div>

  <input type="range" id="sliderMedir" min="60" max="260" value="120">

  <h2 id="resultado">Aro: --</h2>

  <p class="aviso">
    Pode haver variação de até 1 aro dependendo do modelo do anel
  </p>

  <label>
    <input type="checkbox" id="confirmacao">
    Confirmo que conferi a medida
  </label>

  <br><br>

  <button onclick="confirmarMedida()">Confirmar medida</button>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <h2>🎉 Medida confirmada</h2>
    <p id="modalAro"></p>
    <button onclick="fecharModal()">Fechar</button>
  </div>
</div>

</body>
</html>
