<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medidor de Anel - Elegancy Joias</title>

<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>

<body>

<h2>Descubra seu tamanho</h2>

<p class="sub">
Mais de 1.000 clientes já descobriram seu tamanho com precisão
</p>

<!-- CALIBRAÇÃO -->
<div id="calibracao">

  <p>Use uma moeda de 50 centavos</p>

  <div class="area">
    <div id="circuloCalibrar" class="circulo"></div>
  </div>

  <input type="range" id="sliderCalibrar" min="60" max="260" value="120">

  <br><br>
  <button onclick="confirmarCalibracao()">Confirmar calibração</button>
</div>

<!-- MEDIÇÃO -->
<div id="medicao" style="display:none;">

  <h3>Agora ajuste no seu anel</h3>

  <div class="area">
    <div id="circuloMedir" class="circulo"></div>
  </div>

  <input type="range" id="sliderMedir" min="60" max="260" value="120">

  <h2 id="resultado">Aro: --</h2>

  <label>
    <input type="checkbox" id="confirmacao">
    Confirmo que conferi a medida corretamente
  </label>

  <br><br>

  <button onclick="confirmarMedida()">Confirmar e comprar</button>
</div>

</body>
</html>
