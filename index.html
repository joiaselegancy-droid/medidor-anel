<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Medidor de Anel - Elegancy Joias</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <h1>Elegancy Joias</h1>
</div>

<!-- =========================
     CALIBRAÇÃO
========================= -->
<div id="calibracao" class="tela ativa">
  <h2>Calibração</h2>
  <p>Coloque uma moeda de 50 centavos e ajuste o círculo EXATAMENTE na borda interna</p>

  <div class="container">
    <div class="area">
      <div id="circuloCalibrar" class="circulo"></div>
    </div>

    <input type="range" id="sliderCalibrar" class="slider" min="50" max="300" value="120">
  </div>

  <button onclick="confirmarCalibracao()">Confirmar</button>
</div>

<!-- =========================
     MEDIÇÃO
========================= -->
<div id="medicao" class="tela">
  <h2>Descubra seu tamanho</h2>
  <p>Ajuste o círculo na parte INTERNA do anel</p>

  <div class="container">
    <div class="area">
      <div id="circuloMedir" class="circulo"></div>
    </div>

    <input type="range" id="sliderMedir" class="slider" min="50" max="300" value="120">
  </div>

  <div id="resultado">Aro: --</div>
  <div id="feedback">✔ Encaixe perfeito</div>

  <button onclick="comprar()">Comprar com esse tamanho</button>
</div>

<script src="script.js"></script>

</body>
</html>
