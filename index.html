<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medidor de Anel - Elegancy Joias</title>

<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>

<body>

<!-- LOGO -->
<div class="header">
  <img src="https://images.tcdn.com.br/img/img_prod/746662/1629095744_novo_logo1.jpg" class="logo">
</div>

<h2>Descubra seu tamanho</h2>

<!-- CALIBRAÇÃO -->
<div id="calibracao">

  <p>Use uma moeda de 50 centavos</p>

  <div class="area">
    <div id="circuloCalibrar" class="circulo"></div>
  </div>

  <input type="range" id="sliderCalibrar" min="60" max="260" value="120">

  <button onclick="confirmarCalibracao()">Confirmar calibração</button>
</div>

<!-- MEDIÇÃO -->
<div id="medicao" style="display:none;">

  <p>Ajuste na parte INTERNA do anel</p>

  <div class="area">
    <div id="circuloMedir" class="circulo"></div>
  </div>

  <input type="range" id="sliderMedir" min="60" max="260" value="120">

  <h2 id="resultado">Aro: --</h2>

  <label>
    <input type="checkbox" id="confirmacao">
    Confirmo que conferi a medida
  </label>

  <button onclick="confirmarMedida()">Confirmar medida</button>

</div>

<!-- MODAL CUPOM -->
<div id="modal" class="modal">
  <div class="modal-box">

    <h2>🎉 Parabéns!</h2>
    <p id="modalAro"></p>

    <p>Você ganhou um cupom:</p>

    <div class="cupom">
      MEDIDACERTA
      <button id="copiar">Copiar</button>
    </div>

    <button onclick="fecharModal()">Continuar</button>

  </div>
</div>

<!-- RODAPÉ -->
<footer>
  Criado por Elegancy Joias
</footer>

</body>
</html>
